; Applied on hosts that load per-directory user INIs (PHP-FPM/CGI). May require a few minutes to refresh (user_ini.cache_ttl).
; If uploads still fail, set the same values in php.ini / pool.d/www.conf and ensure the web server allows large bodies (e.g. nginx client_max_body_size).
upload_max_filesize = 100M
post_max_size = 100M

services:
  # 1. The PHP Application (Logic)
  app:
    image: ghcr.io/wordroids/variety-web-portal:latest
    container_name: variety-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - laravel_storage:/var/www/html/storage
      - laravel_cache:/var/www/html/bootstrap/cache
      - laravel_public:/var/www/html/public
    networks:
      - laravel

  # 2. The Web Server (Gateway)
  web:
    image: nginx:alpine
    container_name: variety-web
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - laravel_public:/var/www/html/public:ro
      - laravel_storage:/var/www/html/storage
      - laravel_cache:/var/www/html/bootstrap/cache
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - laravel

  # 3. The Database (Storage)
  db:
    image: mysql:8.0
    container_name: variety-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: ${DB_USERNAME:-laravel_user}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laravel

  # 4. Background Worker (Queues)
  queue:
    image: ghcr.io/wordroids/variety-web-portal:latest
    container_name: variety-queue
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - laravel_storage:/var/www/html/storage
      - laravel_cache:/var/www/html/bootstrap/cache
    networks:
      - laravel

  # 5. Task Scheduler (Automation)
  scheduler:
    image: ghcr.io/wordroids/variety-web-portal:latest
    container_name: variety-scheduler
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    volumes:
      - laravel_storage:/var/www/html/storage
      - laravel_cache:/var/www/html/bootstrap/cache
    networks:
      - laravel

volumes:
  laravel_storage:
  laravel_cache:
  laravel_public:
  db_data:

networks:
  laravel:
    driver: bridge

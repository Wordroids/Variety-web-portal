name: Deploy Variety Web Portal

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/wordroids/variety-web-portal

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          # ----- ENABLE CACHE ----
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # -----------------------

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/variety-web-portal
            docker compose -f compose.prod.yaml pull

            docker compose -f compose.prod.yaml up -d

            docker exec variety-app php artisan migrate --force
            docker exec variety-app php artisan optimize
            docker exec variety-app php artisan view:clear

            docker image prune -f
